<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIX未来视野 - 多维度大模型排名</title>
  <link rel="icon" href="assets/AIX.jpg" type="image/jpeg">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="top-nav">
    <div class="nav-inner">
      <a href="/" class="logo-link">
        <img src="assets/AIX.jpg" alt="AIX Logo" class="logo-img">
        AIX未来视野
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link active">排行榜</a>
        <a href="models.html" class="nav-link">模型库</a>
        <a href="calculator.html" class="nav-link">成本计算</a>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <header class="page-header">
      <h1 class="page-title">多维度大模型<span class="text-gradient">排名</span></h1>
      <p class="page-subtitle">聚合全球主流 AI 模型榜单，一表看清谁更强。</p>
    </header>

    <div class="content-layout">
      <aside class="sidebar">
        <div class="sidebar-card">
          <h3 class="sidebar-title">排行榜类型</h3>
          <ul class="board-list" id="boardList">
            <li class="board-item">
              <button class="board-btn active" data-board="general">
                <span class="material-symbols-outlined icon">auto_awesome</span>
                <span class="label">通用排行榜</span>
              </button>
            </li>
            <li class="board-item">
              <button class="board-btn" data-board="reasoning">
                <span class="material-symbols-outlined icon">code</span>
                <span class="label">推理模型总排行榜</span>
              </button>
            </li>
            <li class="board-item">
              <button class="board-btn" data-board="open">
                <span class="material-symbols-outlined icon">terminal</span>
                <span class="label">开源排行榜</span>
              </button>
            </li>
          </ul>
        </div>
      </aside>

      <section class="leaderboard-section">
        <div class="search-container">
          <div class="search-box">
            <span class="material-symbols-outlined search-icon">search</span>
            <input type="text" id="searchInput" class="search-input" placeholder="搜索模型名称或厂商...">
            <button id="clearSearch" class="clear-btn" style="display:none;" aria-label="清除搜索">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
        </div>

        <div class="update-info">
          <div id="updateTime" class="update-badge" style="display:none;">
            <span class="material-symbols-outlined">update</span>
            <span id="updateText"></span>
          </div>
        </div>

        <div class="table-header">
          <div class="header-cell cell-rank">排名</div>
          <div class="header-cell cell-name">模型名称</div>
          <div class="header-cell cell-vendor">厂商</div>
          <div class="header-cell cell-type">类型</div>
          <div class="header-cell cell-languages">语言能力</div>
          <div class="header-cell cell-score">总分</div>
          <div class="header-cell cell-dim">数学推理</div>
          <div class="header-cell cell-dim">幻觉控制</div>
          <div class="header-cell cell-dim">科学推理</div>
          <div class="header-cell cell-dim">指令遵循</div>
          <div class="header-cell cell-dim">代码生成</div>
          <div class="header-cell cell-dim">智能体</div>
        </div>

        <div class="leaderboard-container" id="leaderboardContainer">
          <div id="loadingState" class="loading-state">
            <div class="loading-spinner"></div>
            <p>加载数据中...</p>
          </div>
          <div id="emptyState" class="empty-state" style="display:none;">
            <span class="material-symbols-outlined empty-icon">search_off</span>
            <p>未找到匹配的模型</p>
          </div>
          <div id="modelCards" class="model-cards" style="display:none;"></div>
        </div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <p>© 2026 AIX未来视野. 保留所有权利。</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
